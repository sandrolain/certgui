name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .tool-versions
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Build frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test -race ./...

      - name: Frontend test
        working-directory: web
        run: bun run test
