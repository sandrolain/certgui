version: 2

project_name: certgui

before:
  hooks:
    # Build the frontend assets before compiling Go binaries.
    # The Go embed directive (internal/server/assets.go) requires the dist/
    # directory to be populated before `go build` is invoked.
    - sh -c "cd web && bun install --frozen-lockfile"
    - sh -c "cd web && bun run build"

builds:
  - id: certgui
    main: ./cmd/certgui
    binary: certgui
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/sandrolain/certgui/cmd/certgui/cli.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # UPX is not available on darwin/arm64 (Apple Silicon) and is unreliable on
    # darwin/amd64 with Go binaries that contain embedded FS data. Enable only
    # for linux and windows where it consistently reduces binary size.
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: darwin
        goarch: arm64

  # Separate build targets for macOS — identical flags, no UPX.
  - id: certgui-darwin
    main: ./cmd/certgui
    binary: certgui
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/sandrolain/certgui/cmd/certgui/cli.version={{ .Version }}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

upx:
  - ids: [ certgui ]
    enabled: true
    compress: best
    lzma: true
    brute: false
    goos: [ linux, windows ]

archives:
  - id: default
    ids: [ certgui, certgui-darwin ]
    formats: [ tar.gz ]
    format_overrides:
      - goos: windows
        formats: [ zip ]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sandrolain
    name: certgui
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
